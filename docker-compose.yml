services:
  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    env_file:
      - ./apps/server/.env
    environment:
      NODE_ENV: production
      PORT: 4000
    ports:
      - "4000:4000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  client:
    build:
      context: ./apps/client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_SOCKET_URL: ""
    ports:
      - "4173:80"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    restart: unless-stopped
    expose:
      - "6379"
